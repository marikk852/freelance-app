name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TON contracts
        run: npm run build -w safedeal-contracts

      - name: Build Mini App
        run: npm run build -w safedeal-miniapp

      - name: Backend integration tests
        working-directory: backend
        run: npx jest tests/api.integration.test.js

      - name: TON contract tests
        run: npm run test -w safedeal-contracts
